<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استضافة بوت ديسكورد</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 استضافة بوت ديسكورد</h1>
        <div class="input-group">
            <label>📄 كود bot.js:</label>
            <textarea id="jsCode" placeholder="الصق كود البوت هنا..."></textarea>
        </div>
        <div class="input-group">
            <label>📦 package.json:</label>
            <textarea id="packageJson" placeholder='{"name": "bot", "dependencies": {"discord.js": "^14.14.1"}}'></textarea>
        </div>
        <button class="btn-host" id="hostBtn" onclick="hostBot()">⚡ Host Bot</button>
        <div id="status"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
